services:
  - type: web
    name: vix-iv-alert-dashboard
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATA_PROVIDER
        value: public
      - key: POLL_SECONDS
        value: 60
      - key: WATCHLIST
        value: NVDA,TSLA,TQQQ,QQQ,AAPL,MSFT,AMZN,GOOGL,META,AMD
